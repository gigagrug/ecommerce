<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ block "meta_desc" . }}A premium ecommerce for electronics, food, and home goods.{{ end }}" />
    <script>
      if (localStorage.getItem("theme") === "dark" || (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <link href="/static/output.css?v={{ .AppVersion }}" rel="stylesheet" />
    <script defer src="/static/app.js?v={{ .AppVersion }}"></script>
    <title>Ecommerce</title>
  </head>
  <body class="flex min-h-screen flex-col">
    <nav class="sticky top-0 z-40 border-b border-neutral-200 bg-white/80 backdrop-blur-md dark:border-neutral-800 dark:bg-neutral-950/80">
      <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-y-4 p-4 md:flex-nowrap md:gap-y-0">
        <a href="/" class="order-1 flex shrink-0 items-center gap-2 transition-opacity hover:opacity-80">
          <div class="rounded-lg bg-neutral-900 p-1.5 text-white dark:bg-white dark:text-neutral-900">
            <i data-lucide="shopping-bag" class="size-5"></i>
          </div>
          <span class="text-xl font-bold tracking-tight">Ecommerce</span>
        </a>

        <div class="order-2 flex items-center gap-1 sm:gap-2 md:order-3">
          <a href="/cart" class="btn btn-ghost relative px-2 sm:px-4" aria-label="Cart">
            <i data-lucide="shopping-cart" class="size-5"></i>
            <span class="hidden font-medium sm:inline">Cart</span>
          </a>

          <div class="relative" x-data="userDropdown">
            <button @click="open = !open" type="button" class="btn btn-ghost px-2 sm:px-4" aria-expanded="false">
              <i data-lucide="user" class="size-5"></i>
              <span class="hidden font-medium sm:inline">Account</span>
              <i data-lucide="chevron-down" class="size-4 text-neutral-400 transition-transform duration-200" :class="open ? 'rotate-180' : ''"></i>
            </button>

            <div x-show="open" @click.outside="open = false" x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-75" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95" style="display: none;" class="fixed inset-x-4 top-32 z-50 mt-2 w-auto origin-top-right divide-y divide-neutral-100 rounded-xl border border-neutral-200 bg-white shadow-lg md:absolute md:inset-auto md:top-full md:right-0 md:w-56 dark:divide-neutral-800 dark:border-neutral-800 dark:bg-neutral-900">
              <div class="p-1">
                {{ if .IsLoggedIn }}
                  <a href="/profile" class="dropdown-item"> <i data-lucide="user-circle" class="size-4"></i> Profile </a>

                  {{ if .IsEmployee }}
                    <a href="/admin/dashboard" class="dropdown-item"> <i data-lucide="layout-dashboard" class="size-4"></i> Dashboard </a>
                  {{ end }}

                {{ else }}
                  <a href="/register" class="dropdown-item"> <i data-lucide="user-plus" class="size-4"></i> Register </a>
                  <a href="/login" class="dropdown-item"> <i data-lucide="log-in" class="size-4"></i> Login </a>
                {{ end }}


                <button onclick="theme()" type="button" class="dropdown-item justify-between">
                  <span class="flex items-center gap-2"><i data-lucide="sun-moon" class="size-4"></i> Theme</span>
                </button>
              </div>

              {{ if .IsLoggedIn }}
                <div class="p-1">
                  <form action="/logout" method="POST" class="w-full">
                    <button type="submit" class="dropdown-item w-full text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/20"><i data-lucide="log-out" class="size-4"></i> Logout</button>
                  </form>
                </div>
              {{ end }}
            </div>
          </div>
        </div>

        <form action="/search" method="GET" class="order-3 w-full md:order-2 md:mx-4 md:w-auto md:max-w-md md:flex-1 lg:max-w-lg" x-data="smartSearch('{{ .Query }}')">
          <label for="search-input" class="sr-only">Search</label>
          <input type="hidden" name="q" :value="combinedValue" />

          <div class="group relative">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
              <i data-lucide="search" class="size-4 text-neutral-500"></i>
            </div>

            <div class="input flex h-auto min-h-10.5 cursor-text flex-wrap items-center gap-2 py-1.5 pl-10" @click="$refs.searchInput.focus()">
              <template x-for="(tag, index) in tags" :key="index">
                <span class="inline-flex items-center gap-1 rounded-full border border-neutral-200 bg-neutral-100 px-2 py-0.5 text-sm font-medium text-neutral-800 dark:border-neutral-700 dark:bg-neutral-800 dark:text-neutral-200">
                  <span class="text-neutral-500 dark:text-neutral-400" x-text="tag.key + ':'"></span>
                  <span x-text="tag.value"></span>

                  <button type="button" @click.stop="removeTag(index)" class="ml-0.5 rounded-full p-0.5 text-neutral-400 hover:bg-neutral-200 hover:text-neutral-600 dark:hover:bg-neutral-700">
                    <i data-lucide="x" class="size-3"></i>
                  </button>
                </span>
              </template>

              <input x-ref="searchInput" id="search-input" type="text" class="min-w-20 grow bg-transparent outline-none placeholder:text-neutral-400 dark:placeholder:text-neutral-500" placeholder="Search..." x-model="inputText" @input="handleInput" @keydown.backspace="handleBackspace" @keydown.enter.prevent="$el.closest('form').submit()" autocomplete="off" />
            </div>
          </div>
        </form>
      </div>
    </nav>

    <main class="mx-auto w-full max-w-7xl flex-1 px-4 py-8">
      {{ block "content" . }}{{ end }}
    </main>

    {{ block "js" . }}{{ end }}


    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.effect(() => {
          setTimeout(() => {
            if (window.lucide) {
              lucide.createIcons();
            }
          }, 0);
        });

        Alpine.data("userDropdown", () => ({
          open: false,
          // init() function completely removed! Go handles this now.
        }));

        Alpine.data("smartSearch", (initialQuery = "") => ({
          tags: [],
          inputText: "",

          init() {
            if (initialQuery) {
              this.parseFullString(initialQuery);
            }
          },

          handleInput(e) {
            if (this.inputText.endsWith(" ")) {
              const buffer = this.inputText.trim();
              const lastWord = buffer.split(" ").pop();
              if (lastWord && lastWord.includes(":") && !lastWord.startsWith(":") && !lastWord.endsWith(":")) {
                const [key, value] = lastWord.split(":");
                this.tags.push({ key, value });
                const remainingText = buffer.substring(0, buffer.lastIndexOf(lastWord)).trim();
                this.inputText = remainingText + (remainingText ? " " : "");
              }
            }
          },

          handleBackspace(e) {
            if (this.inputText === "" && this.tags.length > 0) {
              e.preventDefault();
              const lastTag = this.tags.pop();
              this.inputText = `${lastTag.key}:${lastTag.value}`;
            }
          },

          removeTag(index) {
            this.tags.splice(index, 1);
          },

          parseFullString(str) {
            const parts = str.split(" ");
            let cleanText = [];
            parts.forEach((part) => {
              if (part.includes(":") && !part.startsWith(":") && !part.endsWith(":")) {
                const [key, value] = part.split(":");
                this.tags.push({ key, value });
              } else {
                cleanText.push(part);
              }
            });
            this.inputText = cleanText.join(" ");
          },

          get combinedValue() {
            const tagString = this.tags.map((t) => `${t.key}:${t.value}`).join(" ");
            return `${tagString} ${this.inputText}`.trim();
          },
        }));
      });
    </script>
  </body>
</html>
