{{ block "content" . }}
  {{ template "sellernav" }}
  <div
    x-data="supportPage({
      stats: {
          openTickets: {{ .PageData.Stats.OpenTickets }},
          pendingTickets: {{ .PageData.Stats.PendingTickets }},
          resolvedToday: {{ .PageData.Stats.ResolvedToday }}
      },
      tickets: [
        {{ range .PageData.Tickets }}
      { id: '{{ .ID }}', orderId: '{{ .OrderID }}', customer: '{{ .Customer }}', subject: '{{ .Subject }}', status: '{{ .Status }}', priority: '{{ .Priority }}', lastUpdated: '{{ .LastUpdated }}', message: `{{ .Message }}` },
    {{ end }}
      ]
  })"
  >
    <div class="mx-auto px-4 pt-8">
      <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <h1 class="flex items-center gap-2 text-2xl font-bold">
            <i data-lucide="life-buoy" class="size-6 text-blue-600 dark:text-blue-500"></i>
            Customer Support
          </h1>
          <p class="mt-1 text-sm text-neutral-500 dark:text-neutral-400">Manage buyer inquiries, returns, and issues.</p>
        </div>
      </div>

      <div class="mb-8 grid gap-4 sm:grid-cols-3">
        <div class="card border-l-4 border-l-red-500 p-5">
          <p class="text-sm font-medium text-neutral-500 dark:text-neutral-400">Needs Action (Open)</p>
          <h3 class="mt-1 text-2xl font-bold text-neutral-900 dark:text-white" x-text="stats.openTickets"></h3>
        </div>
        <div class="card border-l-4 border-l-yellow-500 p-5">
          <p class="text-sm font-medium text-neutral-500 dark:text-neutral-400">Awaiting Buyer (Pending)</p>
          <h3 class="mt-1 text-2xl font-bold text-neutral-900 dark:text-white" x-text="stats.pendingTickets"></h3>
        </div>
        <div class="card border-l-4 border-l-green-500 p-5">
          <p class="text-sm font-medium text-neutral-500 dark:text-neutral-400">Resolved Today</p>
          <h3 class="mt-1 text-2xl font-bold text-neutral-900 dark:text-white" x-text="stats.resolvedToday"></h3>
        </div>
      </div>

      <div class="card mb-6 p-4">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div class="relative w-full md:w-80">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
              <i data-lucide="search" class="size-4 text-neutral-500"></i>
            </div>
            <input type="text" x-model="search" class="input pl-9" placeholder="Search ticket, order, or customer..." />
          </div>

          <div class="flex items-center gap-2 overflow-x-auto pb-2 md:pb-0">
            <template x-for="status in ['All', 'Open', 'Pending', 'Resolved']">
              <button
                @click="statusFilter = status"
                class="rounded-full border px-3 py-1 text-xs font-medium whitespace-nowrap transition-colors"
                :class="statusFilter === status 
                  ? 'bg-neutral-900 text-white border-neutral-900 dark:bg-white dark:text-neutral-900 dark:border-white' 
                  : 'bg-white text-neutral-600 border-neutral-200 hover:bg-neutral-50 dark:bg-neutral-900 dark:text-neutral-400 dark:border-neutral-800 dark:hover:bg-neutral-800'"
                x-text="status"
              ></button>
            </template>
          </div>
        </div>
      </div>

      <div class="card overflow-hidden">
        <div class="relative overflow-x-auto">
          <table class="w-full text-left text-sm text-neutral-500 dark:text-neutral-400">
            <thead class="table-head">
              <tr>
                <th class="px-6 py-3">Ticket</th>
                <th class="px-6 py-3">Customer</th>
                <th class="px-6 py-3">Subject</th>
                <th class="px-6 py-3">Status</th>
                <th class="px-6 py-3">Last Updated</th>
                <th class="px-6 py-3 text-right">Action</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-neutral-200 dark:divide-neutral-700">
              <template x-for="ticket in filteredTickets" :key="ticket.id">
                <tr class="table-row cursor-pointer hover:bg-neutral-50 dark:hover:bg-neutral-800/50" @click="openTicket(ticket)">
                  <td class="px-6 py-4">
                    <div class="font-medium text-blue-600 dark:text-blue-400" x-text="ticket.id"></div>
                    <div class="mt-0.5 text-xs text-neutral-500" x-text="`Order: ${ticket.orderId}`"></div>
                  </td>
                  <td class="px-6 py-4">
                    <div class="font-medium text-neutral-900 dark:text-neutral-100" x-text="ticket.customer"></div>
                  </td>
                  <td class="px-6 py-4">
                    <div class="flex items-center gap-2">
                      <template x-if="ticket.priority === 'High'">
                        <i data-lucide="alert-circle" class="size-4 text-red-500"></i>
                      </template>
                      <span class="max-w-50 truncate font-medium text-neutral-900 dark:text-neutral-200" x-text="ticket.subject"></span>
                    </div>
                  </td>
                  <td class="px-6 py-4">
                    <span
                      class="inline-flex items-center gap-1.5 rounded-full px-2 py-1 text-xs font-medium"
                      :class="{
                          'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400': ticket.status === 'Open',
                          'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400': ticket.status === 'Pending',
                          'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400': ticket.status === 'Resolved'
                        }"
                    >
                      <span
                        class="h-1.5 w-1.5 rounded-full"
                        :class="{
                            'bg-red-500': ticket.status === 'Open',
                            'bg-yellow-500': ticket.status === 'Pending',
                            'bg-green-500': ticket.status === 'Resolved'
                          }"
                      ></span>
                      <span x-text="ticket.status"></span>
                    </span>
                  </td>
                  <td class="px-6 py-4" x-text="ticket.lastUpdated"></td>
                  <td class="px-6 py-4 text-right">
                    <button class="btn btn-ghost p-2 text-neutral-600 hover:text-blue-600 dark:text-neutral-400 dark:hover:text-blue-400">Respond</button>
                  </td>
                </tr>
              </template>

              <tr x-show="filteredTickets.length === 0" style="display: none;">
                <td colspan="6" class="p-12 text-center text-neutral-500">
                  <i data-lucide="inbox" class="mx-auto mb-2 size-8 opacity-20"></i>
                  <p>No support tickets found matching your search.</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div x-show="activeTicket" class="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/50 p-4 backdrop-blur-sm" style="display: none;" x-transition>
      <div @click.outside="closeTicket" class="w-full max-w-2xl rounded-xl border border-neutral-200 bg-white shadow-xl dark:border-neutral-800 dark:bg-neutral-900">
        <template x-if="activeTicket">
          <div>
            <div class="flex items-center justify-between border-b border-neutral-200 p-4 dark:border-neutral-800">
              <div>
                <h2 class="text-lg font-bold" x-text="activeTicket.subject"></h2>
                <p class="text-sm text-neutral-500" x-text="`${activeTicket.id} • ${activeTicket.customer}`"></p>
              </div>
              <button @click="closeTicket" class="rounded-full p-2 text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800">
                <i data-lucide="x" class="size-5"></i>
              </button>
            </div>

            <div class="p-6">
              <div class="mb-6 rounded-lg border border-neutral-200 bg-neutral-50 p-4 dark:border-neutral-800 dark:bg-neutral-800/50">
                <div class="mb-4 flex items-center justify-between border-b border-neutral-200 pb-2 text-sm dark:border-neutral-700">
                  <span class="font-bold text-neutral-900 dark:text-white" x-text="activeTicket.customer"></span>
                  <span class="text-neutral-500" x-text="activeTicket.lastUpdated"></span>
                </div>
                <div class="max-h-[40vh] overflow-y-auto text-sm leading-relaxed whitespace-pre-wrap text-neutral-700 dark:text-neutral-300" x-text="activeTicket.message"></div>
              </div>

              <div>
                <label class="form-label">Your Reply</label>
                <textarea x-model="replyText" rows="4" class="input py-2" placeholder="Type your response to the customer..."></textarea>
              </div>
            </div>

            <div class="flex items-center justify-between rounded-b-xl border-t border-neutral-200 bg-neutral-50 p-4 dark:border-neutral-800 dark:bg-neutral-900/50">
              <div class="flex items-center gap-2">
                <select x-model="activeTicket.status" class="input select h-auto py-1.5 text-sm">
                  <option value="Open">Status: Open</option>
                  <option value="Pending">Status: Pending (Awaiting Buyer)</option>
                </select>
              </div>
              <div class="flex gap-2">
                <button @click="closeTicket" class="btn btn-ghost border border-neutral-200 dark:border-neutral-700">Cancel</button>
                <button @click="sendReply" id="replyBtn" class="btn btn-primary" :disabled="(!replyText.trim() && activeTicket.status !== 'Resolved') || isLoading">
                  <i data-lucide="send" class="size-4" x-show="!isLoading"></i>
                  <i data-lucide="loader-circle" class="size-4 animate-spin" x-show="isLoading" style="display: none;"></i>
                  <span>Send Reply</span>
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("alpine:init", () => {
      Alpine.data("supportPage", (goData) => ({
        search: "",
        statusFilter: "All",
        tickets: goData.tickets,
        stats: goData.stats,
        activeTicket: null,
        replyText: "",
        isLoading: false, // Track loading state

        init() {
          this.$nextTick(() => lucide.createIcons());
          this.$watch("filteredTickets", () => this.$nextTick(() => lucide.createIcons()));
          this.$watch("activeTicket", () => this.$nextTick(() => lucide.createIcons()));
        },

        get filteredTickets() {
          return this.tickets.filter((ticket) => {
            const term = this.search.toLowerCase();
            const matchesSearch = ticket.id.toLowerCase().includes(term) || ticket.customer.toLowerCase().includes(term) || ticket.orderId.toLowerCase().includes(term) || ticket.subject.toLowerCase().includes(term);
            const matchesStatus = this.statusFilter === "All" || ticket.status === this.statusFilter;
            return matchesSearch && matchesStatus;
          });
        },

        openTicket(ticket) {
          this.activeTicket = { ...ticket };
          this.replyText = "";
        },

        closeTicket() {
          this.activeTicket = null;
          this.replyText = "";
        },

        async sendReply() {
          this.isLoading = true;

          try {
            const res = await fetch(`/api/admin/support/${this.activeTicket.id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                reply: this.replyText,
                status: this.activeTicket.status,
              }),
            });

            if (!res.ok) throw new Error(await res.text());

            // Update Local UI State
            const index = this.tickets.findIndex((t) => t.id === this.activeTicket.id);
            if (index !== -1) {
              const oldStatus = this.tickets[index].status;
              this.tickets[index].status = this.activeTicket.status;
              this.tickets[index].lastUpdated = "Just now";

              // If there's a reply, append it to the local view so it shows instantly
              if (this.replyText.trim() !== "") {
                this.tickets[index].message += `\n\n--- Admin Reply (Just now) ---\n${this.replyText}`;
              }

              // Update stats dynamically
              if (this.activeTicket.status === "Resolved" && oldStatus !== "Resolved") {
                this.stats.resolvedToday++;
                if (oldStatus === "Open") this.stats.openTickets = Math.max(0, this.stats.openTickets - 1);
                if (oldStatus === "Pending") this.stats.pendingTickets = Math.max(0, this.stats.pendingTickets - 1);
              } else if (this.activeTicket.status === "Pending" && oldStatus === "Open") {
                this.stats.pendingTickets++;
                this.stats.openTickets = Math.max(0, this.stats.openTickets - 1);
              }
            }

            this.closeTicket();
          } catch (error) {
            alert(`Failed to update ticket: ${error.message}`);
          } finally {
            this.isLoading = false;
          }
        },
      }));
    });
  </script>
{{ end }}
