version: "2"
linters:
  default: all
  disable:
    - wsl
    - wsl_v5
    - zerologlint
    - varnamelen
    - tagalign
    - nlreturn
    - lll
    - godot
    - godoclint
    - funlen
    - embeddedstructfieldcheck
    - exhaustruct
    - mnd
    - canonicalheader
    - noinlineerr

    # Maybe enable later
    - depguard
    - cyclop
    - nestif
    - dupl

  settings:
    revive:
      enable-all-rules: false
      rules:
        - name: exported
          disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
